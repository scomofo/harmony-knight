name: harmony_knight
description: "Quest of the Harmony Knight - A neuro-inclusive music theory app optimized for ADHD learners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  flutter_soloud: ^3.1.0
  isar: ^4.0.3
  isar_flutter_libs: ^4.0.3
  freezed_annotation: ^2.4.6
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  collection: ^1.19.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  isar_generator: ^4.0.3
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/fonts/
